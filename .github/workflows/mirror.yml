name: Mirror to ROCm/FastFlowLM

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  delete:
  schedule:
    - cron: '17 * * * *'  # Hourly safety sync
  workflow_dispatch:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Push mirror to ROCm/FastFlowLM
        env:
          SOURCE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIRROR_SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Load the deploy key for the target repo.
          mkdir -p ~/.ssh
          printf '%s\n' "${MIRROR_SSH_KEY}" > ~/.ssh/mirror_key
          chmod 600 ~/.ssh/mirror_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/mirror_key -o IdentitiesOnly=yes"

          # Bare mirror clone of the source (this repo) — all branches and tags.
          git clone --mirror \
            "https://x-access-token:${SOURCE_TOKEN}@github.com/${{ github.repository }}.git" repo.git
          cd repo.git

          # Push all branches and tags to the target over SSH. --prune deletes
          # branches/tags on the target that no longer exist on the source, so it
          # stays an exact copy. We push heads + tags explicitly (not --mirror)
          # because GitHub rejects the read-only refs/pull/* refs, which would
          # otherwise fail the whole push.
          # Keep ROCm/FastFlowLM read-only during this phase or its refs get clobbered.
          git push --prune git@github.com:ROCm/FastFlowLM.git \
            'refs/heads/*:refs/heads/*' \
            'refs/tags/*:refs/tags/*'
