name: Mirror to ROCm/FastFlowLM

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  delete:
  schedule:
    - cron: '17 * * * *'  # Hourly safety sync
  workflow_dispatch:

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint token for the target repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MIRROR_APP_ID }}
          private-key: ${{ secrets.MIRROR_APP_PRIVATE_KEY }}
          owner: ROCm
          repositories: FastFlowLM

      - name: Push mirror to ROCm/FastFlowLM
        env:
          SOURCE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MIRROR_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Bare mirror clone of the source (this repo) — all branches and tags.
          git clone --mirror \
            "https://x-access-token:${SOURCE_TOKEN}@github.com/${{ github.repository }}.git" repo.git
          cd repo.git

          # Push all branches and tags to the target over HTTPS with a short-lived
          # GitHub App installation token (carries Contents + Workflows write, so it
          # can mirror .github/workflows/*). --prune deletes branches/tags on the
          # target that no longer exist on the source, so it stays an exact copy.
          # We push heads + tags explicitly (not --mirror) because GitHub rejects the
          # read-only refs/pull/* refs, which would otherwise fail the whole push.
          # Keep ROCm/FastFlowLM read-only during this phase or its refs get clobbered.
          git push --prune \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/ROCm/FastFlowLM.git" \
            'refs/heads/*:refs/heads/*' \
            'refs/tags/*:refs/tags/*'
