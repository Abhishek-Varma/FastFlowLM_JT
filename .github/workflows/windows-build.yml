name: Build Windows Package

on:
  push:
    branches:
      - main
      - windows_zip_workflow
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: [self-hosted, windows, x64]
    
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch pinned Windows HRX release artifact
        id: hrx
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = "Stop"
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          .\hrx-integration\fetch-hrx-release.ps1

      - name: Configure CMake
        shell: powershell
        env:
          CMAKE_PREFIX_PATH: ${{ steps.hrx.outputs.prefix }}
        run: |
          # Native deps (Boost/CURL/FFMPEG/FFTW3) are linked by raw name from the
          # runner's standalone Boost (C:/dev/boost_1_88_0) and vcpkg lib dirs, as
          # on main — so no vcpkg toolchain is needed here. CMAKE_PREFIX_PATH above
          # points find_package(hrx) at the fetched HRX release package.
          cmake --preset windows-vs18

      - name: Build
        shell: powershell
        run: |
          cmake --build --preset windows-default --config Release --parallel

      - name: Prepare package files
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "dist"

          if (Test-Path $dist) {
            Remove-Item $dist -Recurse -Force
          }

          New-Item -ItemType Directory -Force $dist | Out-Null

          # Main executable
          Copy-Item -Path .\build\flm.exe -Destination $dist\ -Force

          # Required data assets
          Copy-Item -Path .\xclbins -Destination $dist\ -Recurse -Force
          Copy-Item -Path .\model_list.json -Destination $dist\ -Force
          Copy-Item -Path .\lib\*.dll -Destination $dist\ -Force

          # HRX runtime DLL (from the pinned Windows HRX artifact) — required by flm.exe at runtime
          $hrxDll = Get-ChildItem -Path ..\hrx-integration\.hrx-release\hrx-amdxdna-*-windows-x86_64\bin\hrx.dll -ErrorAction Stop | Select-Object -First 1
          Copy-Item -Path $hrxDll.FullName -Destination $dist\ -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastflowlm-windows-${{ github.sha }}
          path: src/dist/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-windows
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release zip
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          zip_name="fastflowlm_${version}_windows_amd64.zip"

          # Zip the downloaded artifact payload once for the GitHub Release asset.
          cd release-assets
          zip -r "../${zip_name}" .

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: fastflowlm_*.zip
          overwrite_files: true
          fail_on_unmatched_files: true